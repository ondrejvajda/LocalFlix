<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalFlix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <a href="index.html"><h1 class="header-title">LocalFlix</h1></a>
      </div>

      <nav class="header-nav">
        <a href="index.html">Home</a>
        <a href="#">Library</a>
        <a href="#">Settings</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="watch-container">
      <div class="watch-heading">
        <p class="watch-label">Now playing</p>
        <h2 class="watch-title">Film 1</h2>
      </div>

      <div class="watch-video">
        <div class="video-frame">
          <video controls preload="metadata" poster="assets/film1-poster.jpg">
            <source src="media/film1.mp4" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="https://github.com/ondrejvajda" target="_blank">GitHub</a>
        <a href="mailto:ondrej.vajda@pm.me">Contact</a>
      </div>
      <p class="footer-copy">© 2025 Ondřej Vajda</p>
    </div>
  </footer>
</body>
</html>
