<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalFlix</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <a href="/static/index.html"><h1 class="header-title">LocalFlix</h1></a>
      </div>

      <nav class="header-nav">
        <a href="/static/index.html">Home</a>
        <a href="/static/settings.html">Settings</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="library-header">
      <div>
        <h2>My library</h2>
        <p class="library-count" id="libraryCount">Loading movies...</p>
      </div>

      <div class="library-tools">
        <label class="search-box">
          <span>Search</span>
          <input id="movieSearch" type="search" placeholder="Find a movie">
        </label>

        <label class="sort-box">
          <span>Sort</span>
          <select id="movieSort">
            <option value="az">A-Z</option>
            <option value="za">Z-A</option>
            <option value="newest">Newest</option>
          </select>
        </label>

        <button class="refresh-button" id="refreshMovies" type="button">Refresh</button>
      </div>
    </div>

    <div class="movie_wrapper" id="movieGrid"></div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="https://github.com/ondrejvajda" target="_blank">GitHub</a>
        <a href="mailto:ondrej.vajda@pm.me">Contact</a>
      </div>
      <p class="footer-copy">&copy; 2026 Ondřej Vajda</p>
    </div>
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
