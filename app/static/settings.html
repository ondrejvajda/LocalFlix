<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalFlix</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <a href="/static/index.html"><h1 class="header-title">LocalFlix</h1></a>
      </div>

      <nav class="header-nav">
        <a href="/static/index.html">Home</a>
        <a href="/static/settings.html">Settings</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="settings-page">
      <div class="settings-heading">
        <h2>Settings</h2>
        <p>Customize your LocalFlix experience.</p>
      </div>

      <div class="settings-grid">
        <article class="settings-card">
          <div>
            <h3>Playback</h3>
            <p>Start movies automatically when possible.</p>
          </div>
          <label class="settings-option">
            <span>Enabled</span>
            <input id="autoplaySetting" type="checkbox" checked>
          </label>
        </article>

        <article class="settings-card">
          <div>
            <h3>Progress bars</h3>
            <p>Show watch progress on movie cards.</p>
          </div>
          <label class="settings-option">
            <span>Enabled</span>
            <input id="progressBarsSetting" type="checkbox" checked>
          </label>
        </article>

        <article class="settings-card">
          <div>
            <h3>Watch progress</h3>
            <p>Clear saved playback positions for all movies.</p>
          </div>
          <button class="settings-button" id="resetProgressButton" type="button">Reset progress</button>
        </article>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="https://github.com/ondrejvajda" target="_blank">GitHub</a>
        <a href="mailto:ondrej.vajda@pm.me">Contact</a>
      </div>
      <p class="footer-copy">&copy; 2026 Ondřej Vajda</p>
    </div>
  </footer>
  <script src="/static/script.js"></script>
</body>
</html>
